version: "3.9"

services:
  # ── Backend FastAPI ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatbot_juridique_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db
      - backend_logs:/app/logs
      - ocr_cache:/app/ocr_cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - chatbot_network

  # ── Frontend React (Vite + Nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        VITE_API_BASE_URL: http://localhost:8000
    container_name: chatbot_juridique_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - chatbot_network

# ── Persistent Volumes ────────────────────────────────────────────────────────
volumes:
  chroma_data:
    driver: local
  backend_logs:
    driver: local
  ocr_cache:
    driver: local

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  chatbot_network:
    driver: bridge
